name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.1'
          - '8.2'
          - '8.3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-lock

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: Dump optimized autoload
        run: composer dump-autoload -o

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Run PHP syntax checks
        run: php scripts/php-syntax-check.php

      - name: Validate CLI JSON output
        run: php scripts/validate-cli-json.php

      - name: Verify repository hygiene
        run: php scripts/repository-hygiene.php
