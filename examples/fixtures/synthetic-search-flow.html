<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Synthetic Search Flow</title>
</head>
<body>
  <main>
    <h1>Search Records</h1>
    <form id="record-search" method="get" action="/synthetic/records/search">
      <label for="record-query">Search query</label>
      <input id="record-query" name="q" type="search" placeholder="Find records">
      <button type="submit">Search</button>
    </form>
  </main>
</body>
</html>
