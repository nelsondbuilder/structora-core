<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rendered Search Fixture</title>
</head>
<body>
  <main data-rendered="true">
    <h1>Rendered Search</h1>
    <form id="rendered-search" method="get" action="/synthetic/rendered-search">
      <label for="rendered-query">Search query</label>
      <input id="rendered-query" name="q" type="search" placeholder="Rendered query">
      <button type="submit">Search</button>
    </form>
  </main>
</body>
</html>
